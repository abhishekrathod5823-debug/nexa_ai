<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa AI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #090d1f;
    --surface: #0f1629;
    --card:    #141e38;
    --border:  rgba(120,130,200,0.18);
    --accent:  #7c6afd;
    --accent2: #22d3ee;
    --text:    #e2e8f0;
    --muted:   #64748b;
    --error:   #f87171;
    --success: #4ade80;
    --font:    'Space Grotesk', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background dots */
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 50%, rgba(124,106,253,0.12) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(34,211,238,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .bg-dots {
    position: fixed;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  /* Floating orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    animation: float 8s ease-in-out infinite;
  }
  .orb-1 { width: 400px; height: 400px; background: rgba(124,106,253,0.15); top: -100px; left: -100px; }
  .orb-2 { width: 300px; height: 300px; background: rgba(34,211,238,0.1); bottom: -50px; right: -50px; animation-delay: -4s; }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-30px); }
  }

  .card {
    position: relative;
    z-index: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 44px 40px;
    width: 100%;
    max-width: 420px;
    animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; color: #fff;
  }
  .logo-text { font-size: 22px; font-weight: 700; color: var(--text); }
  .logo-text span { color: var(--accent); }

  h1 { font-size: 24px; font-weight: 600; margin-bottom: 6px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.02em; }

  input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: var(--font);
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input::placeholder { color: var(--muted); }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,253,0.15);
  }

  .btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #9f7aea);
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }
  .btn:hover { opacity: 0.92; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .btn-loader {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(248,113,113,0.12);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--error);
    margin-bottom: 16px;
    display: none;
  }
  .error-msg.show { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .divider {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin: 20px 0;
    position: relative;
  }
  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%; left: 0;
    width: calc(50% - 20px);
    height: 1px;
    background: var(--border);
  }
  .divider::after { left: auto; right: 0; }

  .signup-link {
    text-align: center;
    font-size: 14px;
    color: var(--muted);
    margin-top: 20px;
  }
  .signup-link a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  .signup-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-dots"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">N</div>
    <div class="logo-text">Nexa <span>AI</span></div>
  </div>

  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to continue your conversations</p>

  <div class="error-msg" id="errorMsg"></div>

  <div class="form-group">
    <label>Email address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
  </div>

  <button class="btn" id="loginBtn" onclick="login()">Sign in</button>

  <p class="signup-link">Don't have an account? <a href="signup.html">Create one</a></p>
</div>

<script>
  const API = 'https://nexa-ai-s8w0.onrender.com';

  // Agar pehle se login hai to dashboard pe bhejo
  if (localStorage.getItem('token')) {
    window.location.href = 'dashboard.html';
  }

  // Enter dabane pe bhi login ho
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  async function login() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    // Basic validation
    if (!email || !password) {
      showError('Please fill in all fields.');
      return;
    }

    // Loading state
    btn.disabled = true;
    btn.innerHTML = '<span class="btn-loader"></span>Signing in…';
    errorMsg.classList.remove('show');

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        showError(data.detail || 'Invalid email or password.');
        return;
      }

      // Token save karo aur dashboard pe bhejo
      localStorage.setItem('token', data.access_token);
      window.location.href = 'dashboard.html';

    } catch (err) {
      showError('Cannot connect to server. Make sure the backend is running.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Sign in';
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }
</script>
</body>
</html>
