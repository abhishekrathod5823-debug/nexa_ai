<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa AI</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #090d1f;
  --surface: #0f1629;
  --card:    #141e38;
  --card2:   #1a2548;
  --border:  rgba(120,130,200,0.18);
  --accent:  #7c6afd;
  --accent2: #22d3ee;
  --text:    #e2e8f0;
  --muted:   #64748b;
  --error:   #f87171;
  --success: #4ade80;
  --font:    'Space Grotesk', sans-serif;
  --sidebar: 280px;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ─── SIDEBAR ─────────────────────────────────── */
.sidebar {
  width: var(--sidebar);
  min-width: var(--sidebar);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  z-index: 10;
}

.sidebar-top {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border);
}

.logo {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px;
}
.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
.logo-text { font-size: 18px; font-weight: 700; }
.logo-text span { color: var(--accent); }

.btn-new-chat {
  width: 100%;
  background: linear-gradient(135deg, var(--accent), #9f7aea);
  border: none; border-radius: 10px;
  padding: 10px 14px;
  font-family: var(--font); font-size: 14px; font-weight: 600;
  color: #fff; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: opacity 0.2s, transform 0.1s;
}
.btn-new-chat:hover { opacity: 0.88; }
.btn-new-chat:active { transform: scale(0.98); }
.btn-new-chat svg { width: 16px; height: 16px; }

.sidebar-label {
  font-size: 11px; font-weight: 600;
  color: var(--muted); letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 16px 16px 8px;
}

.chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px;
}
.chat-list::-webkit-scrollbar { width: 4px; }
.chat-list::-webkit-scrollbar-track { background: transparent; }
.chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.chat-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px;
  border-radius: 9px;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
  group: true;
}
.chat-item:hover { background: var(--card); }
.chat-item.active { background: var(--card2); }

.chat-item-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}
.chat-item-title {
  flex: 1; font-size: 13.5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text);
}
.chat-item.active .chat-item-title { color: #fff; font-weight: 500; }

.chat-item-del {
  display: none;
  background: none; border: none;
  color: var(--error); cursor: pointer;
  padding: 4px; border-radius: 4px;
  font-size: 14px; line-height: 1;
  transition: background 0.15s;
}
.chat-item:hover .chat-item-del { display: flex; }
.chat-item-del:hover { background: rgba(248,113,113,0.15); }

.no-chats {
  text-align: center;
  padding: 32px 16px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.7;
}

.sidebar-bottom {
  padding: 12px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.user-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 600; color: #fff;
  flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-tag { font-size: 11px; color: var(--muted); }

.btn-logout {
  background: none; border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 10px;
  font-family: var(--font); font-size: 12px;
  color: var(--muted); cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-logout:hover { border-color: var(--error); color: var(--error); }

/* ─── MAIN AREA ────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* ─── GALLERY VIEW ─────────────────────────────── */
.gallery-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.gallery-header {
  text-align: center;
  margin-bottom: 12px;
  z-index: 2;
}
.gallery-header h2 {
  font-size: 28px; font-weight: 700;
  background: linear-gradient(135deg, var(--text), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}
.gallery-header p { color: var(--muted); font-size: 14px; }

.gallery-empty {
  text-align: center; padding: 40px 20px;
}
.gallery-empty .empty-icon {
  font-size: 48px; margin-bottom: 16px;
  filter: grayscale(0.3);
}
.gallery-empty h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.gallery-empty p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
.btn-start {
  background: linear-gradient(135deg, var(--accent), #9f7aea);
  border: none; border-radius: 10px;
  padding: 11px 24px;
  font-family: var(--font); font-size: 14px; font-weight: 600;
  color: #fff; cursor: pointer;
  transition: opacity 0.2s;
}
.btn-start:hover { opacity: 0.88; }

/* ─── CIRCULAR GALLERY ─────────────────────────── */
.circular-gallery-wrap {
  width: 100%;
  height: 420px;
  position: relative;
  overflow: hidden;
  cursor: grab;
  user-select: none;
  touch-action: pan-y;
}
.circular-gallery-wrap:active { cursor: grabbing; }

.cg-item {
  position: absolute;
  left: 0; top: 50%;
  display: flex; flex-direction: column; align-items: center;
  will-change: transform, opacity;
}

.cg-card {
  width: 100%;
  aspect-ratio: 3/4;
  border-radius: 16px;
  overflow: hidden;
  display: flex; flex-direction: column;
  padding: 20px;
  position: relative;
  cursor: pointer;
  transition: box-shadow 0.2s;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
.cg-card:hover { box-shadow: 0 24px 60px rgba(0,0,0,0.7); }

.cg-card-date {
  font-size: 11px; font-weight: 500;
  color: rgba(255,255,255,0.5);
  margin-bottom: 12px;
  text-transform: uppercase; letter-spacing: 0.08em;
}
.cg-card-title {
  font-size: 17px; font-weight: 700;
  color: #fff; margin-bottom: 10px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  line-height: 1.4;
}
.cg-card-preview {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  flex: 1;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  line-height: 1.6;
}
.cg-card-badge {
  margin-top: auto;
  padding-top: 12px;
  display: flex; align-items: center; gap: 6px;
}
.cg-card-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.5);
}
.cg-card-open {
  font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,0.6);
}

/* Gradients for chat cards */
.g0 { background: linear-gradient(135deg, #312e81, #1e1b4b); }
.g1 { background: linear-gradient(135deg, #164e63, #0c4a6e); }
.g2 { background: linear-gradient(135deg, #3b0764, #4c1d95); }
.g3 { background: linear-gradient(135deg, #064e3b, #065f46); }
.g4 { background: linear-gradient(135deg, #450a0a, #7f1d1d); }
.g5 { background: linear-gradient(135deg, #1e3a5f, #1e40af); }
.g6 { background: linear-gradient(135deg, #431407, #78350f); }
.g7 { background: linear-gradient(135deg, #0f172a, #1e3a5f); }

.cg-caption {
  margin-top: 14px;
  font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,0.4);
  white-space: nowrap;
  text-align: center;
}

/* ─── CHAT VIEW ────────────────────────────────── */
.chat-view {
  display: none;
  flex: 1;
  flex-direction: column;
  height: 100%;
}
.chat-view.active { display: flex; }

.chat-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  background: var(--surface);
  flex-shrink: 0;
}

.btn-back {
  background: none; border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 12px;
  font-family: var(--font); font-size: 13px;
  color: var(--muted); cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.15s;
}
.btn-back:hover { border-color: var(--accent); color: var(--accent); }

.chat-title-wrap { flex: 1; min-width: 0; }
.chat-title-text {
  font-size: 15px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.chat-title-sub { font-size: 12px; color: var(--muted); }

.chat-actions { display: flex; gap: 8px; }
.btn-icon {
  background: none; border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 10px;
  font-family: var(--font); font-size: 12px; font-weight: 500;
  color: var(--muted); cursor: pointer;
  transition: all 0.15s;
}
.btn-icon:hover { border-color: var(--accent); color: var(--accent); }
.btn-icon.danger:hover { border-color: var(--error); color: var(--error); }

/* Messages */
.messages-area {
  flex: 1; overflow-y: auto;
  padding: 24px 20px;
  display: flex; flex-direction: column; gap: 18px;
}
.messages-area::-webkit-scrollbar { width: 4px; }
.messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.msg-row {
  display: flex; gap: 12px; align-items: flex-start;
  animation: msgIn 0.3s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

.msg-row.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; flex-shrink: 0;
}
.msg-avatar.ai { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
.msg-avatar.user { background: var(--card2); color: var(--text); }

.msg-bubble {
  max-width: 70%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 14.5px; line-height: 1.7;
}
.msg-row.ai .msg-bubble {
  background: var(--card);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
  color: var(--text);
}
.msg-row.user .msg-bubble {
  background: linear-gradient(135deg, var(--accent), #9f7aea);
  border-top-right-radius: 4px;
  color: #fff;
}

.msg-time {
  font-size: 11px; color: var(--muted);
  margin-top: 4px;
  text-align: right;
}
.msg-row.ai .msg-time { text-align: left; }

/* Typing indicator */
.typing-indicator {
  display: flex; gap: 12px; align-items: flex-start;
  animation: msgIn 0.3s ease both;
}
.typing-dots {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px; border-top-left-radius: 4px;
  padding: 14px 18px;
  display: flex; gap: 5px; align-items: center;
}
.typing-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--muted);
  animation: bounce 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }

/* Input area */
.input-area {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex; gap: 10px; align-items: flex-end;
  flex-shrink: 0;
}

.input-wrap {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  display: flex; align-items: flex-end;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-wrap:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(124,106,253,0.12);
}

#messageInput {
  flex: 1;
  background: none; border: none;
  padding: 12px 16px;
  font-family: var(--font); font-size: 14.5px;
  color: var(--text);
  outline: none; resize: none;
  min-height: 48px; max-height: 160px;
  line-height: 1.6;
}
#messageInput::placeholder { color: var(--muted); }

.btn-send {
  background: linear-gradient(135deg, var(--accent), #9f7aea);
  border: none; border-radius: 11px;
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  transition: opacity 0.2s, transform 0.1s;
}
.btn-send:hover { opacity: 0.88; }
.btn-send:active { transform: scale(0.95); }
.btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-send svg { width: 18px; height: 18px; color: #fff; }

.input-hint {
  text-align: center;
  font-size: 11px; color: var(--muted);
  padding-bottom: 4px;
  flex-shrink: 0;
}

/* Rename modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }

.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  width: 360px;
  transform: scale(0.95);
  transition: transform 0.2s;
}
.modal-overlay.show .modal { transform: scale(1); }
.modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
.modal input {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; font-family: var(--font);
  font-size: 14px; color: var(--text); outline: none;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}
.modal input:focus { border-color: var(--accent); }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
.btn-cancel {
  background: none; border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 16px;
  font-family: var(--font); font-size: 13px;
  color: var(--muted); cursor: pointer;
}
.btn-save {
  background: var(--accent); border: none;
  border-radius: 8px; padding: 8px 16px;
  font-family: var(--font); font-size: 13px; font-weight: 600;
  color: #fff; cursor: pointer;
  transition: opacity 0.2s;
}
.btn-save:hover { opacity: 0.88; }

/* Utility */
.hidden { display: none !important; }

/* Animated bg */
.bg-ambient {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse at 10% 50%, rgba(124,106,253,0.07) 0%, transparent 60%),
    radial-gradient(ellipse at 90% 20%, rgba(34,211,238,0.05) 0%, transparent 50%);
}

@media (max-width: 700px) {
  .sidebar { display: none; }
}
</style>
</head>
<body>
<div class="bg-ambient"></div>

<!-- ─── SIDEBAR ─── -->
<aside class="sidebar">
  <div class="sidebar-top">
    <div class="logo">
      <div class="logo-icon">N</div>
      <div class="logo-text">Nexa <span>AI</span></div>
    </div>
    <button class="btn-new-chat" onclick="newChat()">
      <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      New conversation
    </button>
  </div>

  <p class="sidebar-label">Recent chats</p>

  <div class="chat-list" id="sidebarChatList">
    <div class="no-chats">No conversations yet.<br>Start a new chat above.</div>
  </div>

  <div class="sidebar-bottom">
    <div class="user-avatar" id="userAvatarSidebar">?</div>
    <div class="user-info">
      <div class="user-name" id="usernameSidebar">Loading…</div>
      <div class="user-tag">Free plan</div>
    </div>
    <button class="btn-logout" onclick="logout()">Sign out</button>
  </div>
</aside>

<!-- ─── MAIN ─── -->
<main class="main">

  <!-- GALLERY VIEW -->
  <div class="gallery-view" id="galleryView">
    <div class="gallery-header" id="galleryHeader">
      <h2 id="welcomeText">Welcome back!</h2>
      <p>Select a conversation or start a new one</p>
    </div>

    <!-- Empty state -->
    <div class="gallery-empty hidden" id="galleryEmpty">
      <div class="empty-icon">💬</div>
      <h3>No conversations yet</h3>
      <p>Start your first chat with Nexa AI</p>
      <button class="btn-start" onclick="newChat()">Start chatting</button>
    </div>

    <!-- Circular Gallery -->
    <div class="circular-gallery-wrap hidden" id="circularGallery"></div>
  </div>

  <!-- CHAT VIEW -->
  <div class="chat-view" id="chatView">
    <div class="chat-header">
      <button class="btn-back" onclick="showGallery()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back
      </button>
      <div class="chat-title-wrap">
        <div class="chat-title-text" id="chatTitleText">Chat</div>
        <div class="chat-title-sub" id="chatTitleSub">Nexa AI</div>
      </div>
      <div class="chat-actions">
        <button class="btn-icon" onclick="openRenameModal()">Rename</button>
        <button class="btn-icon danger" onclick="deleteCurrentChat()">Delete</button>
      </div>
    </div>

    <div class="messages-area" id="messagesArea">
      <!-- Messages injected here -->
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea
          id="messageInput"
          placeholder="Ask Nexa AI anything…"
          rows="1"
          oninput="autoResize(this)"
          onkeydown="handleKey(event)"
        ></textarea>
      </div>
      <button class="btn-send" id="sendBtn" onclick="sendMessage()">
        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
  </div>

</main>

<!-- ─── RENAME MODAL ─── -->
<div class="modal-overlay" id="renameModal">
  <div class="modal">
    <h3>Rename conversation</h3>
    <input type="text" id="renameInput" placeholder="Enter new title…" maxlength="100">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeRenameModal()">Cancel</button>
      <button class="btn-save" onclick="saveRename()">Save</button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════
   CONFIG & STATE
════════════════════════════════ */
const API = 'http://127.0.0.1:8000';
let token        = localStorage.getItem('token');
let currentChatId = null;
let chats        = [];
let username     = '';

// Auth guard
if (!token) window.location.href = 'index.html';

/* ════════════════════════════════
   INIT
════════════════════════════════ */
async function init() {
  await loadUserInfo();
  await loadChats();
}

async function loadUserInfo() {
  // Username ko JWT se decode karte hain (base64)
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    const userId  = payload.user_id;
    // Username ke liye ek fake fetch (chats se pata chalega)
    username = 'User';
    document.getElementById('usernameSidebar').textContent = username;
    document.getElementById('userAvatarSidebar').textContent = username[0].toUpperCase();
    document.getElementById('welcomeText').textContent = `Welcome back!`;
  } catch(e) {}
}

async function loadChats() {
  try {
    const res = await apiFetch('/chats/');
    if (!res.ok) { logout(); return; }
    chats = await res.json();
    renderSidebarChats();
    renderGallery();
  } catch(e) {
    console.error('Load chats error:', e);
  }
}

/* ════════════════════════════════
   SIDEBAR RENDER
════════════════════════════════ */
function renderSidebarChats() {
  const el = document.getElementById('sidebarChatList');
  if (!chats.length) {
    el.innerHTML = '<div class="no-chats">No conversations yet.<br>Start a new chat above.</div>';
    return;
  }

  const colors = ['#7c6afd','#22d3ee','#4ade80','#f472b6','#fb923c','#a78bfa','#34d399','#60a5fa'];
  el.innerHTML = chats.map((chat, i) => `
    <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" id="sidebar-${chat.id}" onclick="openChat(${chat.id})">
      <div class="chat-item-dot" style="background:${colors[i % colors.length]}"></div>
      <span class="chat-item-title">${escHtml(chat.title)}</span>
      <button class="chat-item-del" onclick="event.stopPropagation(); deleteChatById(${chat.id})" title="Delete">✕</button>
    </div>
  `).join('');
}

/* ════════════════════════════════
   CIRCULAR GALLERY
════════════════════════════════ */
const GRADIENTS = ['g0','g1','g2','g3','g4','g5','g6','g7'];

function renderGallery() {
  const gallery = document.getElementById('circularGallery');
  const empty   = document.getElementById('galleryEmpty');

  if (!chats.length) {
    gallery.classList.add('hidden');
    empty.classList.remove('hidden');
    return;
  }

  empty.classList.add('hidden');
  gallery.classList.remove('hidden');
  gallery.innerHTML = '';

  chats.forEach((chat, i) => {
    const item = document.createElement('div');
    item.className = 'cg-item';

    const date = new Date(chat.created_at).toLocaleDateString('en-IN', { day:'numeric', month:'short' });

    item.innerHTML = `
      <div class="cg-card ${GRADIENTS[i % GRADIENTS.length]}" onclick="openChat(${chat.id})">
        <div class="cg-card-date">${date}</div>
        <div class="cg-card-title">${escHtml(chat.title)}</div>
        <div class="cg-card-preview" id="preview-${chat.id}">Loading…</div>
        <div class="cg-card-badge">
          <div class="cg-card-dot"></div>
          <span class="cg-card-open">Open chat →</span>
        </div>
      </div>
      <div class="cg-caption">${escHtml(chat.title)}</div>
    `;
    gallery.appendChild(item);

    // Load preview (last message)
    loadChatPreview(chat.id);
  });

  initGallery(gallery, chats.length);
}

async function loadChatPreview(chatId) {
  try {
    const res = await apiFetch(`/chats/${chatId}/messages`);
    if (!res.ok) return;
    const msgs = await res.json();
    const el   = document.getElementById(`preview-${chatId}`);
    if (!el) return;
    if (!msgs.length) { el.textContent = 'No messages yet. Click to start.'; return; }
    const last = msgs[msgs.length - 1];
    el.textContent = (last.sender === 'ai' ? 'Nexa: ' : 'You: ') + last.content;
  } catch(e) {}
}

/* ─ Circular Gallery Physics ─ */
function initGallery(container, n) {
  const items    = [...container.querySelectorAll('.cg-item')];
  const bend     = 3;
  const ease     = 0.06;
  const speed    = 2;
  const scroll   = { cur: 0, tar: 0 };
  let dims       = {};
  let isDown     = false;
  let startX     = 0;
  let startScr   = 0;

  function resize() {
    const w       = container.clientWidth;
    const cardW   = Math.max(160, Math.min(270, w * 0.22));
    const gap     = Math.max(20, w * 0.03);
    dims          = { w, cardW, gap };
  }
  resize();
  window.addEventListener('resize', resize);

  function lerp(a, b, t) { return a + (b - a) * t; }

  function tick() {
    scroll.cur = lerp(scroll.cur, scroll.tar, ease);
    const { w, cardW, gap } = dims;
    const iw    = cardW + gap;
    const total = iw * n;
    const H     = w / 2;
    const B     = Math.max(0.0001, bend) * (w / 6);

    items.forEach((el, i) => {
      let x = i * iw - scroll.cur;
      x = ((x % total) + total) % total;
      if (x > total / 2) x -= total;

      let y = 0, rot = 0;
      if (bend !== 0) {
        const R    = (H * H + B * B) / (2 * B);
        const ex   = Math.min(Math.abs(x), H);
        y   = R - Math.sqrt(Math.max(R * R - ex * ex, 0));
        rot = Math.sign(x) * Math.asin(Math.min(ex / R, 1)) * (180 / Math.PI);
      }
      const dist    = Math.min(Math.abs(x) / H, 1);
      const scale   = 1 - dist * 0.14;
      const opacity = 1 - dist * 0.35;
      const sx      = w / 2 + x - cardW / 2;

      el.style.width     = cardW + 'px';
      el.style.transform = `translateX(${sx}px) translateY(-50%) translateY(${y}px) rotate(${rot}deg) scale(${scale})`;
      el.style.opacity   = opacity;
      el.style.zIndex    = Math.round((1 - dist) * 100);
    });
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  const getX = e => e.touches ? e.touches[0].clientX : e.clientX;

  const onSnap = () => {
    const iw = dims.cardW + dims.gap;
    scroll.tar = Math.round(scroll.tar / iw) * iw;
  };

  container.addEventListener('mousedown', e => { isDown = true; startX = getX(e); startScr = scroll.cur; });
  window.addEventListener('mousemove',    e => { if (!isDown) return; scroll.tar = startScr + (startX - getX(e)) * speed * 0.9; });
  window.addEventListener('mouseup',      () => { if (!isDown) return; isDown = false; onSnap(); });
  container.addEventListener('touchstart', e => { isDown = true; startX = getX(e); startScr = scroll.cur; }, {passive:true});
  container.addEventListener('touchmove',  e => { if (!isDown) return; scroll.tar = startScr + (startX - getX(e)) * speed * 0.9; }, {passive:true});
  container.addEventListener('touchend',   () => { if (!isDown) return; isDown = false; onSnap(); });
  container.addEventListener('wheel', e => { e.preventDefault(); scroll.tar += (e.deltaY > 0 ? speed : -speed) * 24; }, {passive:false});
}

/* ════════════════════════════════
   CHAT ACTIONS
════════════════════════════════ */
async function newChat() {
  try {
    const res  = await apiFetch('/chats/', 'POST', { title: 'New Chat' });
    if (!res.ok) return;
    const chat = await res.json();
    chats.unshift(chat);
    renderSidebarChats();
    renderGallery();
    openChat(chat.id);
  } catch(e) { console.error(e); }
}

async function openChat(chatId) {
  currentChatId = chatId;
  const chat    = chats.find(c => c.id === chatId);

  // Update sidebar active state
  document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
  const sItem = document.getElementById(`sidebar-${chatId}`);
  if (sItem) sItem.classList.add('active');

  // Show chat view
  document.getElementById('galleryView').style.display = 'none';
  document.getElementById('chatView').classList.add('active');
  document.getElementById('chatTitleText').textContent = chat ? chat.title : 'Chat';
  document.getElementById('chatTitleSub').textContent  = 'Nexa AI · ' + (chat ? new Date(chat.created_at).toLocaleDateString('en-IN') : '');

  // Load messages
  await loadMessages(chatId);
  document.getElementById('messageInput').focus();
}

async function loadMessages(chatId) {
  const area = document.getElementById('messagesArea');
  area.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px">Loading…</div>';

  try {
    const res  = await apiFetch(`/chats/${chatId}/messages`);
    if (!res.ok) { area.innerHTML = ''; return; }
    const msgs = await res.json();
    area.innerHTML = '';

    if (!msgs.length) {
      area.innerHTML = `
        <div style="text-align:center;padding:48px 20px">
          <div style="font-size:40px;margin-bottom:16px">✨</div>
          <div style="font-size:16px;font-weight:600;margin-bottom:8px">Chat is ready</div>
          <div style="color:var(--muted);font-size:14px">Send a message to start the conversation</div>
        </div>`;
      return;
    }

    msgs.forEach(msg => appendMessage(msg.sender, msg.content, msg.created_at, false));
    scrollToBottom();
  } catch(e) { console.error(e); }
}

async function sendMessage() {
  const input   = document.getElementById('messageInput');
  const content = input.value.trim();
  if (!content || !currentChatId) return;

  const sendBtn = document.getElementById('sendBtn');
  input.value   = '';
  input.style.height = '';
  sendBtn.disabled   = true;

  // Show user message immediately
  appendMessage('user', content, new Date().toISOString());

  // Show typing indicator
  const typingEl = showTyping();
  scrollToBottom();

  try {
    const res  = await apiFetch(`/chats/${currentChatId}/messages`, 'POST', { content });
    typingEl.remove();

    if (!res.ok) {
      appendMessage('ai', 'Something went wrong. Please try again.');
      return;
    }
    const msgs = await res.json();
    // msgs[0] = user message (already shown), msgs[1] = AI response
    if (msgs[1]) appendMessage('ai', msgs[1].content, msgs[1].created_at);

    // Refresh sidebar/gallery preview
    await loadChats();
    if (currentChatId) {
      document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
      const sItem = document.getElementById(`sidebar-${currentChatId}`);
      if (sItem) sItem.classList.add('active');
    }
  } catch(e) {
    typingEl.remove();
    appendMessage('ai', 'Cannot reach Nexa AI. Check if the backend server is running.');
  } finally {
    sendBtn.disabled = false;
    input.focus();
    scrollToBottom();
  }
}

function appendMessage(sender, content, time, animate = true) {
  const area = document.getElementById('messagesArea');

  // Remove empty state if present
  const empty = area.querySelector('[style*="text-align:center"]');
  if (empty) empty.remove();

  const isUser = sender === 'user';
  const timeStr = time ? new Date(time).toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' }) : '';

  const row = document.createElement('div');
  row.className = `msg-row ${isUser ? 'user' : 'ai'}`;
  if (!animate) row.style.animation = 'none';

  row.innerHTML = `
    <div class="msg-avatar ${isUser ? 'user' : 'ai'}">${isUser ? '👤' : 'N'}</div>
    <div>
      <div class="msg-bubble">${formatMessage(content)}</div>
      ${timeStr ? `<div class="msg-time">${timeStr}</div>` : ''}
    </div>
  `;
  area.appendChild(row);
}

function formatMessage(text) {
  // Basic markdown-like formatting
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code style="background:rgba(255,255,255,0.1);padding:1px 5px;border-radius:4px;font-size:13px">$1</code>')
    .replace(/\n/g, '<br>');
}

function showTyping() {
  const area = document.getElementById('messagesArea');
  const el   = document.createElement('div');
  el.className = 'typing-indicator';
  el.innerHTML = `
    <div class="msg-avatar ai">N</div>
    <div class="typing-dots">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>`;
  area.appendChild(el);
  return el;
}

function scrollToBottom() {
  const area = document.getElementById('messagesArea');
  area.scrollTop = area.scrollHeight;
}

/* ─ Rename ─ */
function openRenameModal() {
  const chat = chats.find(c => c.id === currentChatId);
  document.getElementById('renameInput').value = chat ? chat.title : '';
  document.getElementById('renameModal').classList.add('show');
  document.getElementById('renameInput').focus();
}
function closeRenameModal() {
  document.getElementById('renameModal').classList.remove('show');
}
async function saveRename() {
  const title = document.getElementById('renameInput').value.trim();
  if (!title || !currentChatId) { closeRenameModal(); return; }

  try {
    const res = await apiFetch(`/chats/${currentChatId}/rename`, 'PUT', { title });
    if (!res.ok) return;
    const updated = await res.json();

    // Update local state
    const idx = chats.findIndex(c => c.id === currentChatId);
    if (idx !== -1) chats[idx].title = updated.title;

    document.getElementById('chatTitleText').textContent = updated.title;
    renderSidebarChats();
    renderGallery();
    closeRenameModal();
  } catch(e) { console.error(e); }
}

/* ─ Delete ─ */
async function deleteCurrentChat() {
  if (!currentChatId || !confirm('Delete this conversation?')) return;
  await deleteChatById(currentChatId);
  showGallery();
}

async function deleteChatById(chatId) {
  try {
    const res = await apiFetch(`/chats/${chatId}`, 'DELETE');
    if (!res.ok) return;
    chats = chats.filter(c => c.id !== chatId);
    if (currentChatId === chatId) { currentChatId = null; showGallery(); }
    renderSidebarChats();
    renderGallery();
  } catch(e) { console.error(e); }
}

/* ─ Navigation ─ */
function showGallery() {
  currentChatId = null;
  document.getElementById('galleryView').style.display = '';
  document.getElementById('chatView').classList.remove('active');
  document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
}

/* ════════════════════════════════
   HELPERS
════════════════════════════════ */
async function apiFetch(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`
    }
  };
  if (body) opts.body = JSON.stringify(body);
  return fetch(`${API}${path}`, opts);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function autoResize(el) {
  el.style.height = '';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function logout() {
  localStorage.removeItem('token');
  window.location.href = 'index.html';
}

// Rename modal - Enter key
document.getElementById('renameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveRename();
  if (e.key === 'Escape') closeRenameModal();
});

// Close modal on overlay click
document.getElementById('renameModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeRenameModal();
});

/* ─ Start ─ */
init();
</script>
