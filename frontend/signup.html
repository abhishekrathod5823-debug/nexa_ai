<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa AI — Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #090d1f;
    --surface: #0f1629;
    --card:    #141e38;
    --border:  rgba(120,130,200,0.18);
    --accent:  #7c6afd;
    --accent2: #22d3ee;
    --text:    #e2e8f0;
    --muted:   #64748b;
    --error:   #f87171;
    --success: #4ade80;
    --font:    'Space Grotesk', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 80% 50%, rgba(124,106,253,0.12) 0%, transparent 50%),
      radial-gradient(circle at 20% 80%, rgba(34,211,238,0.08) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }
  .bg-dots {
    position: fixed; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none; z-index: 0;
  }
  .orb {
    position: fixed; border-radius: 50%;
    filter: blur(80px); pointer-events: none; z-index: 0;
    animation: float 8s ease-in-out infinite;
  }
  .orb-1 { width: 350px; height: 350px; background: rgba(124,106,253,0.12); top: -80px; right: -80px; }
  .orb-2 { width: 280px; height: 280px; background: rgba(34,211,238,0.1); bottom: -60px; left: -60px; animation-delay: -4s; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-25px)} }

  .card {
    position: relative; z-index: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    width: 100%; max-width: 440px;
    animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; color: #fff;
  }
  .logo-text { font-size: 22px; font-weight: 700; }
  .logo-text span { color: var(--accent); }

  h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 7px; }

  input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: var(--font);
    font-size: 15px; color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input::placeholder { color: var(--muted); }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,253,0.15); }

  .password-hint {
    font-size: 12px; color: var(--muted);
    margin-top: 6px;
  }

  .btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #9f7aea);
    border: none; border-radius: 10px;
    padding: 13px;
    font-family: var(--font); font-size: 15px; font-weight: 600;
    color: #fff; cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover { opacity: 0.92; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .btn-loader {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px; vertical-align: middle;
  }
  @keyframes spin { to{transform:rotate(360deg)} }

  .alert {
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .alert.error { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
  .alert.success { background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.3); color: var(--success); }
  .alert.show { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .login-link { text-align: center; font-size: 14px; color: var(--muted); margin-top: 20px; }
  .login-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .login-link a:hover { text-decoration: underline; }

  /* Password strength meter */
  .strength-bar {
    height: 3px; border-radius: 2px;
    background: var(--border); margin-top: 8px;
    overflow: hidden;
  }
  .strength-fill {
    height: 100%; border-radius: 2px;
    width: 0%; transition: width 0.3s, background 0.3s;
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-dots"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">N</div>
    <div class="logo-text">Nexa <span>AI</span></div>
  </div>

  <h1>Create your account</h1>
  <p class="subtitle">Join Nexa AI and start chatting</p>

  <div class="alert error" id="errorMsg"></div>
  <div class="alert success" id="successMsg"></div>

  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Abhishek" autocomplete="username">
  </div>
  <div class="form-group">
    <label>Email address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password" oninput="checkStrength(this.value)">
    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    <p class="password-hint" id="strengthText"></p>
  </div>
  <div class="form-group">
    <label>Confirm password</label>
    <input type="password" id="confirmPassword" placeholder="Re-enter your password" autocomplete="new-password">
  </div>

  <button class="btn" id="signupBtn" onclick="signup()">Create account</button>

  <p class="login-link">Already have an account? <a href="index.html">Sign in</a></p>
</div>

<script>
  const API = 'https://nexa-ai-s8w0.onrender.com';

  function checkStrength(val) {
    const fill = document.getElementById('strengthFill');
    const text = document.getElementById('strengthText');
    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const levels = [
      { w: '20%', c: '#f87171', t: 'Too weak' },
      { w: '40%', c: '#fb923c', t: 'Weak' },
      { w: '60%', c: '#facc15', t: 'Fair' },
      { w: '80%', c: '#4ade80', t: 'Strong' },
      { w: '100%', c: '#22d3ee', t: 'Very strong' },
    ];
    const lvl = levels[Math.min(score - 1, 4)] || { w: '0%', c: '', t: '' };
    fill.style.width = lvl.w;
    fill.style.background = lvl.c;
    text.textContent = val.length ? lvl.t : '';
    text.style.color = lvl.c;
  }

  async function signup() {
    const username        = document.getElementById('username').value.trim();
    const email           = document.getElementById('email').value.trim();
    const password        = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const btn             = document.getElementById('signupBtn');

    // Validation
    if (!username || !email || !password || !confirmPassword) {
      showAlert('error', 'Please fill in all fields.');
      return;
    }
    if (password.length < 6) {
      showAlert('error', 'Password must be at least 6 characters.');
      return;
    }
    if (password !== confirmPassword) {
      showAlert('error', 'Passwords do not match.');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="btn-loader"></span>Creating account…';
    hideAlerts();

    try {
      const res = await fetch(`${API}/auth/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        showAlert('error', data.detail || 'Signup failed. Please try again.');
        return;
      }

      showAlert('success', 'Account created! Redirecting to login…');
      setTimeout(() => window.location.href = 'index.html', 1500);

    } catch (err) {
      showAlert('error', 'Cannot connect to server. Make sure the backend is running.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Create account';
    }
  }

  function showAlert(type, msg) {
    hideAlerts();
    const el = document.getElementById(type === 'error' ? 'errorMsg' : 'successMsg');
    el.textContent = msg;
    el.classList.add('show');
  }
  function hideAlerts() {
    document.getElementById('errorMsg').classList.remove('show');
    document.getElementById('successMsg').classList.remove('show');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') signup(); });
</script>
</body>
</html>
